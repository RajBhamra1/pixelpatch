<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LED Pixel Map</title>
    <style>
      html, body, #root { height: 100%; margin: 0; }
      body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
      .app-layout {
        display: grid;
        grid-template-rows: 48px 1fr 24px;
        grid-template-columns: 280px 1fr;
        grid-template-areas:
          "toolbar toolbar"
          "sidebar viewport"
          "status status";
        height: 100%;
      }
      .toolbar { grid-area: toolbar; display: flex; align-items: center; gap: 8px; padding: 0 12px; border-bottom: 1px solid #222; background: #0b0b0b; color: #eee; }
      .toolbar button, .toolbar select, .toolbar input { background: #222; color: #eee; border: 1px solid #333; padding: 6px 10px; border-radius: 4px; }
      .sidebar { grid-area: sidebar; border-right: 1px solid #ddd; padding: 10px; overflow: auto; background: #f7f7f7; }
      .viewport { grid-area: viewport; position: relative; background: #1f2937; }
      .panel { margin-bottom: 16px; }
      .panel h3 { margin: 0 0 8px; font-size: 14px; color: #333; text-transform: uppercase; letter-spacing: 0.04em; }
      .panel label { display: block; font-size: 12px; color: #555; margin: 8px 0 4px; }
      .panel input, .panel select { width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; }
      .statusbar { grid-area: status; font-size: 12px; padding: 2px 10px; color: #666; border-top: 1px solid #ddd; background: #f3f3f3; display:flex; align-items:center; justify-content:space-between; }
      .small { font-size: 12px; }
      .row { display: flex; gap: 8px; align-items: center; }
      .row > * { flex: 1; }
      .btn { padding: 6px 10px; border-radius: 4px; border: 1px solid #ccc; background: #fff; cursor: pointer; }
      .legend { font-size: 12px; color: #444; }
      .kbd { background:#eee; border:1px solid #ccc; border-radius:4px; padding:1px 4px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
