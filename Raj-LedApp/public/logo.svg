<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Gradient -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#FF4081"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Dot grid -->
    <pattern id="dotGrid" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="3" fill="url(#grad)" opacity="0.22"/>
    </pattern>
  </defs>

  <!-- Rounded background -->
  <rect x="24" y="24" width="464" height="464" rx="56" fill="#101013" stroke="url(#grad)" stroke-width="8"/>

  <!-- Dot grid -->
  <rect x="48" y="48" width="416" height="416" rx="40" fill="url(#dotGrid)"/>

